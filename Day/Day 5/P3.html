<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-element selector</title>
    <style>
       
        p::first-letter{
            border: 2px solid #ec122c;
            font-size :300px;
        }

    </style>
</head>
<body>

    <p>this is a paragraph</p>
    <h1>Heading 1</h1>
    <p>paragraph</p>

</body>
</html>
