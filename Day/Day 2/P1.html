<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Tags</title>
    <style>
        .responsive-image {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>
    <!--src is sourec, alt is alternate text-->
    <h3>Eiffel Tower</h3>
    <img src = "i1.jpg" alt="could not find image">
    <img src = "i1.jpg" alt="could not find image" width = "500" height ="200">
    <img src = "i1.jpg" alt="could not find image" width = "50" height ="50">
    <img src = "i1.jpg" alt="could not find image" title = "my dream">
    
    <img src = "i1.jpg" alt="could not find image" 
    style= "width: 500px; height: 200px; border-radius: 10% ; border: 2px solid rgb(0, 185, 252);">
    
    <p>Image formats supported are :
        1. Jpeg  2. Png  3. Gif  4. Webp  5. Svg  6. Bmp
    </p>

    <h1> Responsive image via css</h1>
    <img src = "i1.jpg" alt="could not find image" class ="responsive-image">
    
</body>
</html>
