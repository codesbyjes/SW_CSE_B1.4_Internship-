<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table spanning</title>
</head>
<body>

    <h1> this is column span for 2 columns</h1>
    <table border = "5">
        <tr>
            <th colspan = "2">
                 Student Record 
            </th>
        </tr>
            <td> hi </td>
            <td> hello </td>
        </tr>
        <tr>
            <td> hi </td>
            <td> hello </td>
        </tr>
        <tr>
            <td> hi </td>
            <td> hello </td>
        </tr>
        <tr>
            <td> hi </td>
            <td> hello </td>
        </tr>

    </table>
    <table border ="2">   
    <h1> this is row span <h1>

        <tr> 
            <th rowspan = "2">day</th>
            <th> evening </th>
            <th> night </th>
        </tr>

        <tr> 
            <td>day</td>
            <td> evening </td>
            
        </tr>
        <tr> 
            <td>day</td>
            <td> evening </td>
            <td> night </td>
        </tr>
        <tr> 
            <td>day</td>
            <td> evening </td>
            <td> night </td>
        </tr>
    </table>


</body>
</html>
