<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>child selector</title>

    <style>
        ul>li {
            background-color: aquamarine;
            color: brown;
        }
    </style>



</head>

<body>
    <h1>heading 1</h1>
    <ul>
        <li>laptop</li>
        <li>mobile phone</li>
        <li>tablet</li>
    </ul>




</body>

</html>
