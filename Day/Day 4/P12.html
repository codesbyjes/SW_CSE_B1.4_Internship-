<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sibling selector</title>


    <style>
        h1+p{
            background-color: aquamarine;
        }

        h3~p{
            color:beige;
            background-color:navy;
        }

    </style>

</head>
<body>
    <h1>heading 1</h1>
    <p>paragraph 1</p>
    <p>paragraph 2</p>

    <h1>heading 2</h1>
    <p>paragraph 3</p>

    <h3> heading 3</h3>
    <p>paragraph 1</p>
    <p>paragraph 2</p>
    <p>paragraph 1</p>
    <p>paragraph 2</p>
    

    
</body>
</html>
