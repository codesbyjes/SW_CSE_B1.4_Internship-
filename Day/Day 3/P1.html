<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tables</title>
</head>
<body>
    <p>HTML Tables</p>
    <table border = "5">
        <caption> Monthly savings</caption>

        <p> th for table header<p>
        <p> tr for table row <p>
        <p> td for table data<p>
        <tr>
            <th>Month</th>
            <th>Savings</th>
        </tr>
        <tr>
            <td>Jun</td>
            <td>50000</td>
        </tr>
        <tr>
            <td>Jul</td>
            <td>75000</td>
        </tr>
    </table>

    
        <p> can divide the entire tab into thead , 
            tbody and tfoot<p>
        <table border="1">
        <caption>Sales Data</caption>
        <thead>
            <tr>
                <th>Month</th>
                <th>Sales</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Jun</td>
                <td>500000</td>
            </tr>
            <tr>
                <td>Jul</td>
                <td>750000</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td>Total</td>
                <td>1250000</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
