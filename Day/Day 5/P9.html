<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS units example</title>

    <style>
    html{
        font-size:16px;
    }
    body{
        font-size: 1rem;
        margin: 0;
        padding : 0;
    }
    .container{
        max-width : 1200px; /*fixed max width of the screen*/
        width : 90%; /*flexible within max outline-width*/
        margin : 0 auto;
        padding: 2rem 1rem; /*vertical & horizontal padding*/
        background-color:lightcoral
    }
    h1.{
        font-size: 2.5rem;
        margin-bottom:0.5em; /*relative to parent tag*/
    }
    p{
        font-size: 1rem;
        line-height:1.6;
        max-width :65px;
    }

    .hero{
        height: 80vh; /*80 percent of viewport*/
        font-size:5vw; /*responsive text*/
        background-color: aquamarine;

    }
    </style>
</head>
<body>

    <div class = "hero">
        <h1>Jes</h1>
    </div>
    <div class = "container">
        <h2>css units</h2>
        <p>example for css units usage</p>


    </div>

    
</body>
</html>
